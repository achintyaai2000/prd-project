<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon | PRD Project</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,800;1,9..144,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    .coming-soon-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      gap: 1.5rem;
    }
    .cs-badge {
      font-size: 4rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .cs-title {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -2px;
      color: var(--ink);
    }
    .cs-title em { color: var(--accent); }
    .cs-sub {
      font-size: 1.05rem;
      color: var(--ink-muted);
      max-width: 400px;
      line-height: 1.7;
    }
    .cs-back {
      display: inline-block;
      background: var(--ink);
      color: var(--cream);
      padding: 0.9rem 2rem;
      border-radius: 999px;
      font-weight: 600;
      text-decoration: none;
      margin-top: 1rem;
      transition: all 0.3s;
    }
    .cs-back:hover { background: var(--accent); transform: translateY(-2px); }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="../index.html" class="nav-logo">📄 PRD<span>Project</span></a>
    <div class="nav-links">
      <a href="../index.html">← Home</a>
    </div>
  </nav>

  <div class="coming-soon-page">
    <div class="cs-badge">🚧</div>
    <h1 class="cs-title">Coming <em>Soon</em></h1>
    <p class="cs-sub">This PRD is currently being researched and written. Check back soon — it'll be worth the wait.</p>
    <a href="../index.html" class="cs-back">← Back to PRD Library</a>
  </div>
</body>
</html>
